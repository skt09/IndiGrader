<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Leaderboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --gold: #fbbf24;
            --silver: #e2e8f0;
            --bronze: #b45309;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            background: linear-gradient(135deg, #000000 0%, #111827 100%);
            background-attachment: fixed;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #38bdf8, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease-out 0.2s both;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: rgba(0,0,0,0.2);
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            white-space: nowrap;
        }

        td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s;
        }

        tr {
            transition: background-color 0.2s;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .rank-cell {
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .rank-1 { color: var(--gold); }
        .rank-2 { color: var(--silver); }
        .rank-3 { color: var(--bronze); }

        .roll-cell {
            font-family: ui-monospace, SFMono-Regular, monospace;
            font-weight: 600;
            color: #e2e8f0;
        }

        .total-cell {
            font-weight: 800;
            color: #38bdf8;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-size: 1.2rem;
            animation: pulse 2s infinite;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Course Leaderboard</h1>
            <p class="subtitle">Live Unified Rankings</p>
        </header>

        <div class="glass-panel">
            <div id="loading" class="loading">Aggregating submission data...</div>
            <table id="leaderboard-table" style="display: none;">
                <thead id="table-head">
                    <!-- Dynamically generated headers -->
                </thead>
                <tbody id="table-body">
                    <!-- Dynamically generated rows -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadLeaderboard() {
            try {
                const response = await fetch('/api/leaderboard');
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                if (data.length === 0) {
                    document.getElementById('loading').innerText = 'No submissions found yet.';
                    return;
                }

                const allQuestions = new Set();
                data.forEach(student => {
                    Object.keys(student.scores).forEach(q => allQuestions.add(q));
                });
                const sortedQuestions = Array.from(allQuestions).sort();

                const thead = document.getElementById('table-head');
                let headerHTML = '<tr><th>Rank</th><th>Roll Number</th>';
                sortedQuestions.forEach(q => {
                    headerHTML += `<th>${q} Score</th>`;
                });
                headerHTML += '<th>Total Marks</th></tr>';
                thead.innerHTML = headerHTML;

                const tbody = document.getElementById('table-body');
                let rowsHTML = '';
                
                data.forEach(student => {
                    let rankClass = '';
                    let trophy = '';
                    if (student.rank === 1) { rankClass = 'rank-1'; trophy = '🏆'; }
                    else if (student.rank === 2) { rankClass = 'rank-2'; trophy = '🥈'; }
                    else if (student.rank === 3) { rankClass = 'rank-3'; trophy = '🥉'; }

                    rowsHTML += `<tr>
                        <td class="rank-cell ${rankClass}">${trophy} #${student.rank}</td>
                        <td class="roll-cell">${student.roll}</td>`;
                    
                    sortedQuestions.forEach(q => {
                        const score = student.scores[q] !== undefined ? student.scores[q].toFixed(1) : '-';
                        rowsHTML += `<td>${score}</td>`;
                    });

                    rowsHTML += `<td class="total-cell">${student.total_marks.toFixed(1)}</td></tr>`;
                });
                
                tbody.innerHTML = rowsHTML;

                document.getElementById('loading').style.display = 'none';
                document.getElementById('leaderboard-table').style.display = 'table';
            } catch (error) {
                console.error('Error fetching leaderboard:', error);
                document.getElementById('loading').innerText = 'Failed to load leaderboard data. Server may be unreachable.';
            }
        }

        loadLeaderboard();
        setInterval(loadLeaderboard, 15000);
    </script>
</body>
</html>
